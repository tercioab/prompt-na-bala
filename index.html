<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptVault | Seu Gerenciador de Inteligência</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@200;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-[#030303]">

  <!-- BACKGROUND SYSTEM -->
  <div class="fixed inset-0 z-[-2] bg-[#080808]"></div>
  
  <!-- Unicorn Studio Animated Background -->
  <div class="fixed inset-0 z-[-1] pointer-events-none opacity-40">
    <div data-us-project="sajpUiTp7MIKdX6daDCu" class="w-full h-full"></div>
  </div>

  <!-- Background Beams Decor -->
  <div class="fixed inset-0 z-[-1] flex justify-around pointer-events-none opacity-30">
    <div class="relative h-full w-px border-l border-white/5">
        <div class="beam h-64 delay-beam-1"></div>
    </div>
    <div class="relative h-full w-px border-l border-white/5">
        <div class="beam h-64 delay-beam-2"></div>
    </div>
    <div class="relative h-full w-px border-l border-white/5">
        <div class="beam h-64 delay-beam-3"></div>
    </div>
    <div class="relative h-full w-px border-l border-white/5">
        <div class="beam h-64 delay-beam-4"></div>
    </div>
  </div>

  <!-- Main Navigation (Blurred) -->
  <div class="fixed top-0 left-0 right-0 h-32 bg-gradient-to-b from-[#030303] via-[#030303]/80 to-transparent z-[50] pointer-events-none"></div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="fixed inset-0 z-[6000] flex items-center justify-center p-4 bg-transparent overflow-y-auto backdrop-blur-sm">
    <div class="w-full max-w-md glass-panel p-10 rounded-[2.5rem] shadow-2xl animate-fade-in">
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary/10 border border-primary/20 mb-6 group transition-all hover:bg-primary/20">
          <i data-lucide="zap" class="w-10 h-10 text-primary animate-pulse"></i>
        </div>
        <h2 class="text-3xl font-manrope font-extrabold tracking-tighter mb-2">PromptVault</h2>
        <p class="text-gray-400 font-medium">Sua biblioteca de prompts premium.</p>
      </div>

      <form id="auth-form" class="space-y-6">
        <div class="space-y-2">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-widest pl-4">E-mail</label>
          <input type="email" id="auth-email" placeholder="nome@exemplo.com" required 
            class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 focus:border-primary/50 focus:outline-none transition-all placeholder:text-gray-600 font-medium">
        </div>
        <div class="space-y-2">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-widest pl-4">Senha</label>
          <input type="password" id="auth-password" placeholder="••••••••" required
            class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 focus:border-primary/50 focus:outline-none transition-all placeholder:text-gray-600">
        </div>

        <button type="submit" id="auth-submit-btn" class="shiny-cta group w-full p-0">
          <div class="btn-aura-border">
            <div class="aura-spinner"></div>
            <div class="btn-aura-inner"></div>
          </div>
          <div class="btn-aura-glow btn-aura-glow-default"></div>
          <div class="points_wrapper">
            <div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
          </div>
          <div class="btn-content w-full">
            <span class="font-bold">Entrar no Sistema</span>
            <i data-lucide="arrow-right" class="w-5 h-5 transition-transform group-hover:translate-x-1"></i>
          </div>
        </button>
      </form>
    </div>
  </div>

  <!-- APP INTERFACE (HIDDEN BY DEFAULT) -->
  <div id="app-interface" class="relative z-10 hidden">
    <nav class="fixed top-0 left-0 right-0 h-24 flex items-center px-10 z-[100] border-b border-white/5 backdrop-blur-md">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-primary flex items-center justify-center shadow-[0_0_20px_rgba(239,35,60,0.4)] animate-pulse">
          <i data-lucide="zap" class="w-6 h-6 text-white fill-current"></i>
        </div>
        <div>
          <h1 class="font-manrope font-extrabold text-xl tracking-tighter">P.VAULT</h1>
          <div class="text-[10px] text-gray-500 font-mono tracking-widest uppercase mt-[-4px]">Intelligence Engine</div>
        </div>
      </div>

      <div class="mx-auto flex gap-10">
        <button id="nav-prompts" class="nav-tab tab-active text-sm font-bold uppercase tracking-widest transition-all">Prompts</button>
        <button id="nav-anotacoes" class="nav-tab text-gray-500 text-sm font-bold uppercase tracking-widest transition-all hover:text-white">Anotações</button>
      </div>

      <div class="relative group">
        <button id="user-menu-btn" class="flex items-center gap-3 glass-panel px-4 py-2.5 rounded-2xl hover:bg-white/10 transition-all border-white/10">
          <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=random" class="w-8 h-8 rounded-xl ring-2 ring-primary/20" alt="Avatar">
          <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
        </button>
        <div id="user-dropdown" class="absolute top-full right-0 mt-3 w-64 glass-panel rounded-2xl p-4 shadow-2xl hidden origin-top-right transition-all">
          <div class="mb-4 px-2">
            <p id="dropdown-user-name" class="font-bold text-white text-sm truncate"></p>
            <p id="dropdown-user-email" class="text-xs text-gray-500 truncate mt-0.5"></p>
          </div>
          <div class="h-px bg-white/5 my-3"></div>
          <button id="btn-logout" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-primary/10 text-red-400 transition-all font-semibold text-sm">
            <span>Encerrar Sessão</span>
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </nav>

    <main class="container mx-auto px-6 pt-32 pb-20">
      
      <!-- Section: PROMPTS -->
      <section id="section-prompts" class="animate-fade-slide">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
          <div class="space-y-2">
            <div class="flex items-center gap-3 text-primary font-mono text-xs tracking-[0.4em] uppercase">
              <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
              Sistema de Prompts
            </div>
            <h1 class="text-4xl md:text-6xl font-manrope font-extrabold tracking-tighter">MINHA COLEÇÃO</h1>
            <p id="prompt-counter" class="text-gray-500 text-sm font-medium">0 prompts sincronizados</p>
          </div>
          
          <button id="btn-new-prompt" class="shiny-cta group p-0 min-w-[180px] h-[52px]">
            <div class="btn-aura-border">
              <div class="aura-spinner"></div>
              <div class="btn-aura-inner"></div>
            </div>
            <div class="btn-aura-glow btn-aura-glow-default"></div>
            <div class="points_wrapper">
              <div class="point house-1"></div><div class="point house-2"></div><div class="point house-3"></div><div class="point house-4"></div><div class="point house-5"></div>
            </div>
            <div class="btn-content">
              <i data-lucide="plus" class="w-5 h-5"></i>
              <span>Novo Prompt</span>
            </div>
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="prompts-grid">
          <!-- Prompts rendering dynamically -->
        </div>
      </section>

      <!-- Section: ANOTAÇÕES -->
      <section id="section-anotacoes" class="hidden animate-fade-slide">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
          <div class="space-y-2">
            <div class="flex items-center gap-3 text-amber-500 font-mono text-xs tracking-[0.4em] uppercase">
              <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
              Brain Dump
            </div>
            <h1 class="text-4xl md:text-6xl font-manrope font-extrabold tracking-tighter">ANOTAÇÕES</h1>
            <p id="anotacao-counter" class="text-gray-500 text-sm font-medium">0 ideias capturadas</p>
          </div>
          
          <button id="btn-new-anotacao" class="shiny-cta group p-0 min-w-[180px] h-[52px]" style="background: radial-gradient(65% 65% at 50% 100%, rgba(234, 88, 12, 0.4) 0%, rgba(234, 88, 12, 0.9) 100%), #d97706;">
            <div class="btn-aura-border">
              <div class="aura-spinner"></div>
              <div class="btn-aura-inner"></div>
            </div>
            <div class="btn-aura-glow btn-aura-glow-default" style="background: radial-gradient(60% 60% at 50% 100%, rgba(234, 88, 12, 0.6) 0%, transparent 100%);"></div>
            <div class="points_wrapper">
              <div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
            </div>
            <div class="btn-content">
              <i data-lucide="edit-3" class="w-5 h-5"></i>
              <span>Criar Nota</span>
            </div>
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="anotacoes-grid">
          <!-- Anotações rendering dynamically -->
        </div>
      </section>
    </main>
  </div>

  <div id="pending-screen" class="fixed inset-0 z-[6000] flex items-center justify-center p-4 bg-transparent hidden backdrop-blur-md">
    <div class="max-w-md text-center glass-panel p-12 rounded-[3rem]">
      <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-8 relative">
        <div class="absolute inset-0 rounded-full animate-ping bg-primary opacity-20"></div>
        <i data-lucide="clock" class="w-12 h-12 text-primary"></i>
      </div>
      <h2 class="text-3xl font-manrope font-extrabold tracking-tighter mb-4 uppercase">Acesso Pendente</h2>
      <p class="text-gray-400 font-medium mb-10 leading-relaxed">
        Sua conta está aguardando liberação. Nosso time está validando suas credenciais.
      </p>
      <button id="pending-access-btn" class="shiny-cta group w-full p-0">
        <div class="btn-aura-border">
          <div class="aura-spinner"></div>
          <div class="btn-aura-inner"></div>
        </div>
        <div class="btn-aura-glow btn-aura-glow-default"></div>
        <div class="points_wrapper">
          <div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div><div class="point"></div>
        </div>
        <div class="btn-content w-full">
          <span>Acessar App</span>
          <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </div>
      </button>
    </div>
  </div>

  <!-- Unicorn Studio Lib -->
  <script>
    !function () { if (!window.UnicornStudio) { window.UnicornStudio = { isInitialized: !1 }; var e = ["init", "addScene", "removeScene", "getScene"], t = function (e) { return function () { var t = Array.prototype.slice.call(arguments); (window.UnicornStudio.queue = window.UnicornStudio.queue || []).push({ method: e, args: t }) } }; e.forEach((function (e) { window.UnicornStudio[e] = t(e) })); var n = document.createElement("script"); n.src = "https://cdn.unicorn.studio/v1.2.1/unicornStudio.umd.js", n.onload = function () { window.UnicornStudio.isInitialized = !0 }, document.head.appendChild(n) } }();
    window.UnicornStudio.init();
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
